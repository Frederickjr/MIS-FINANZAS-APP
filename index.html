<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas VE | Frederick & Dougleisy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONOS SVG ---
        const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>;
        const IconArrowUpCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m16 12-4-4-4 4"></path><path d="M12 8v8"></path></svg>;
        const IconArrowDownCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m8 12 4 4 4-4"></path><path d="M12 8v8"></path></svg>;
        const IconDollarSign = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect><line x1="16" x2="16" y1="2" y2="6"></line><line x1="8" x2="8" y1="2" y2="6"></line><line x1="3" x2="21" y1="10" y2="10"></line></svg>;
        const IconTag = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"></path><path d="M7 7h.01"></path></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>;
        const IconPieChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>;
        const IconRefreshCw = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
        const IconTrash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>;

        const initialRates = { bcv: 36.25, binance: 39.80 };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [rates, setRates] = useState(initialRates);
            const [isLoadingRates, setIsLoadingRates] = useState(true);
            
            // Cargar datos de LocalStorage
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('finanzas_ve_tx');
                return saved ? JSON.parse(saved) : [];
            });
            const [sharedExpenses, setSharedExpenses] = useState(() => {
                const saved = localStorage.getItem('finanzas_ve_shared');
                return saved ? JSON.parse(saved) : [];
            });
            
            const today = new Date();
            const currentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const [selectedMonth, setSelectedMonth] = useState(currentMonthStr);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalType, setModalType] = useState('personal'); 
            const [isEditingRates, setIsEditingRates] = useState(false);
            const [tempRates, setTempRates] = useState(rates);

            // Guardar en LocalStorage cada vez que cambien los datos
            useEffect(() => {
                localStorage.setItem('finanzas_ve_tx', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('finanzas_ve_shared', JSON.stringify(sharedExpenses));
            }, [sharedExpenses]);

            const fetchRates = async () => {
                setIsLoadingRates(true);
                try {
                    const [resBcv, resParalelo] = await Promise.all([
                        fetch('https://ve.dolarapi.com/v1/dolares/oficial'),
                        fetch('https://ve.dolarapi.com/v1/dolares/paralelo')
                    ]);
                    if (!resBcv.ok || !resParalelo.ok) throw new Error("Error API");
                    const dataBcv = await resBcv.json();
                    const dataParalelo = await resParalelo.json();
                    const newRates = {
                        bcv: dataBcv.promedio || dataBcv.precio || rates.bcv,
                        binance: dataParalelo.promedio || dataParalelo.precio || rates.binance
                    };
                    setRates(newRates);
                    setTempRates(newRates);
                } catch (error) {
                    console.error("Usando tasas locales:", error);
                } finally {
                    setIsLoadingRates(false);
                }
            };

            useEffect(() => { fetchRates(); }, []);

            const filteredTransactions = useMemo(() => transactions.filter(t => t.date.startsWith(selectedMonth)), [transactions, selectedMonth]);
            const filteredShared = useMemo(() => sharedExpenses.filter(e => e.date.startsWith(selectedMonth)), [sharedExpenses, selectedMonth]);

            const handleDeleteTx = (id) => setTransactions(transactions.filter(t => t.id !== id));
            const handleDeleteShared = (id) => setSharedExpenses(sharedExpenses.filter(e => e.id !== id));

            const formatUSD = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
            const formatVES = (amount) => new Intl.NumberFormat('es-VE', { style: 'currency', currency: 'VES' }).format(amount).replace('VES', 'Bs');

            const stats = useMemo(() => {
                let totalIncomeUSD = 0, totalExpenseUSD = 0;
                const categories = {};
                filteredTransactions.forEach(t => {
                    if (t.type === 'income') {
                        totalIncomeUSD += t.amountUSD;
                    } else {
                        totalExpenseUSD += t.amountUSD;
                        categories[t.category] = (categories[t.category] || 0) + t.amountUSD;
                    }
                });
                const sortedCategories = Object.entries(categories).sort(([, a], [, b]) => b - a).map(([name, amount]) => ({ name, amount }));
                return {
                    balanceUSD: totalIncomeUSD - totalExpenseUSD,
                    balanceVES: (totalIncomeUSD - totalExpenseUSD) * rates.bcv,
                    totalIncomeUSD, totalExpenseUSD, sortedCategories
                };
            }, [filteredTransactions, rates]);

            const sharedStats = useMemo(() => {
                let paidByMe = 0, paidByPartner = 0;
                filteredShared.forEach(e => {
                    if (e.paidBy === 'me') paidByMe += e.amountUSD;
                    if (e.paidBy === 'partner') paidByPartner += e.amountUSD;
                });
                const total = paidByMe + paidByPartner;
                const balance = paidByMe - (total / 2);
                return { total, paidByMe, paidByPartner, balance };
            }, [filteredShared]);

            const handleSaveTransaction = async (data, syncOther) => {
                const newRecord = { id: Date.now().toString(), ...data };
                
                // Enviar a Google Apps Script
                fetch('https://script.google.com/macros/s/AKfycbywkGOByUIHpK4gDkvWzC3O2CjI0dbzIMQPOk5pMQt-FGM-eRXbgU2JM4-0UiZgXEN1jw/exec', {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoria: data.category, descripcion: data.description, monto: data.amountUSD })
                }).catch(err => console.error(err));

                if (modalType === 'personal') {
                    setTransactions(prev => [...prev, newRecord]);
                    if (syncOther && data.type === 'expense') {
                        setSharedExpenses(prev => [...prev, { ...newRecord, id: Date.now().toString() + 's', paidBy: 'me' }]);
                    }
                } else {
                    setSharedExpenses(prev => [...prev, newRecord]);
                    if (syncOther && data.paidBy === 'me') {
                        setTransactions(prev => [...prev, { ...newRecord, id: Date.now().toString() + 't', type: 'expense' }]);
                    }
                }
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row text-slate-800">
                    <nav className="bg-emerald-900 text-white w-full md:w-64 flex-shrink-0 md:min-h-screen flex flex-col shadow-xl z-10">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-lg"><IconActivity /></div>
                            <h1 className="text-xl font-bold tracking-tight">Finanzas<span className="text-emerald-400">VE</span></h1>
                        </div>
                        <div className="flex-1 px-4 space-y-2 overflow-y-auto hidden md:block">
                            <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<IconHome />} label="Resumen" />
                            <NavItem active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} icon={<IconCreditCard />} label="Mis Movimientos" />
                            <NavItem active={activeTab === 'shared'} onClick={() => setActiveTab('shared')} icon={<IconUsers />} label="Gastos Pareja" />
                        </div>
                        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-emerald-900 text-white flex justify-around p-3 pb-safe shadow-lg z-50">
                            <MobileNavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<IconHome />} label="Resumen" />
                            <MobileNavItem active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} icon={<IconCreditCard />} label="Movimientos" />
                            <MobileNavItem active={activeTab === 'shared'} onClick={() => setActiveTab('shared')} icon={<IconUsers />} label="Pareja" />
                        </div>
                    </nav>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white shadow-sm px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 z-0">
                            <div>
                                <h2 className="text-2xl font-bold">{activeTab === 'dashboard' ? 'Resumen Mensual' : activeTab === 'transactions' ? 'Mis Movimientos' : 'Cuentas Compartidas'}</h2>
                                <input type="month" className="mt-1 text-sm font-bold border border-slate-200 rounded-lg p-1.5 bg-slate-50 outline-none focus:border-emerald-500" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} />
                            </div>
                            <div className="flex items-center gap-4 bg-slate-100 p-2 rounded-xl border border-slate-200">
                                {isEditingRates ? (
                                    <div className="flex items-center gap-3">
                                        <div className="flex flex-col"><span className="text-xs text-slate-500 font-semibold">BCV</span><input type="number" step="0.01" className="w-20 text-sm p-1 rounded" value={tempRates.bcv} onChange={e => setTempRates({...tempRates, bcv: parseFloat(e.target.value)})} /></div>
                                        <div className="flex flex-col"><span className="text-xs text-slate-500 font-semibold">Paralelo</span><input type="number" step="0.01" className="w-20 text-sm p-1 rounded" value={tempRates.binance} onChange={e => setTempRates({...tempRates, binance: parseFloat(e.target.value)})} /></div>
                                        <button onClick={() => { setRates(tempRates); setIsEditingRates(false); }} className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-medium">Guardar</button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="text-right">
                                            <div className="flex items-center gap-2 text-sm"><span className="font-semibold">BCV:</span><span className="text-emerald-700 font-bold">{isLoadingRates ? '...' : rates.bcv} Bs</span></div>
                                            <div className="flex items-center gap-2 text-sm"><span className="font-semibold">Paralelo:</span><span className="text-emerald-700 font-bold">{isLoadingRates ? '...' : rates.binance} Bs</span></div>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={fetchRates} className="p-2 text-slate-400 bg-white rounded-lg border border-slate-200 hover:text-emerald-600"><IconRefreshCw className={isLoadingRates ? 'animate-spin' : ''} /></button>
                                            <button onClick={() => setIsEditingRates(true)} className="p-2 text-slate-400 bg-white rounded-lg border border-slate-200 hover:text-emerald-600"><IconSettings /></button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-6">
                            
                            {/* DASHBOARD */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 max-w-6xl mx-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-gradient-to-br from-emerald-600 to-emerald-800 rounded-2xl p-6 text-white shadow-lg">
                                            <div className="flex items-center justify-between mb-4"><h3 className="text-emerald-100 font-medium">Balance Disponible</h3><div className="p-2 bg-emerald-500/30 rounded-lg"><IconDollarSign /></div></div>
                                            <p className="text-4xl font-bold mb-1">{formatUSD(stats.balanceUSD)}</p>
                                            <p className="text-emerald-200 text-sm">≈ {formatVES(stats.balanceVES)} <span className="text-xs opacity-75">(Ref. BCV)</span></p>
                                        </div>
                                        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                            <div className="flex items-center justify-between mb-4"><h3 className="text-slate-500 font-medium">Ingresos Totales</h3><div className="p-2 bg-blue-50 text-blue-600 rounded-lg"><IconArrowUpCircle /></div></div>
                                            <p className="text-3xl font-bold">{formatUSD(stats.totalIncomeUSD)}</p>
                                        </div>
                                        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                            <div className="flex items-center justify-between mb-4"><h3 className="text-slate-500 font-medium">Gastos Totales</h3><div className="p-2 bg-rose-50 text-rose-600 rounded-lg"><IconArrowDownCircle /></div></div>
                                            <p className="text-3xl font-bold">{formatUSD(stats.totalExpenseUSD)}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                            <h3 className="font-bold text-lg flex items-center gap-2 mb-6"><IconPieChart /> Gastos por Categoría</h3>
                                            {stats.sortedCategories.length > 0 ? (
                                                <div className="space-y-4">
                                                    {stats.sortedCategories.map((cat, idx) => {
                                                        const percentage = ((cat.amount / stats.totalExpenseUSD) * 100).toFixed(0);
                                                        return (
                                                            <div key={idx}>
                                                                <div className="flex justify-between text-sm mb-1"><span className="font-medium">{cat.name}</span><span className="text-slate-500">{formatUSD(cat.amount)} ({percentage}%)</span></div>
                                                                <div className="w-full bg-slate-100 rounded-full h-2.5"><div className="bg-emerald-500 h-2.5 rounded-full" style={{ width: `${percentage}%` }}></div></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            ) : <p className="text-center text-slate-400 py-10">No hay gastos este mes.</p>}
                                        </div>

                                        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                            <div className="flex items-center justify-between mb-6">
                                                <h3 className="font-bold text-lg flex items-center gap-2"><IconUsers /> Estado con Dougleisy</h3>
                                                <button onClick={() => setActiveTab('shared')} className="text-sm text-emerald-600 font-medium hover:underline">Ver detalles</button>
                                            </div>
                                            <div className="bg-slate-50 rounded-xl p-5 border border-slate-100 text-center">
                                                <p className="text-sm text-slate-500 mb-2">Estado actual (50/50)</p>
                                                {sharedStats.balance > 0 ? (
                                                    <div><p className="text-2xl font-bold text-emerald-600">{formatUSD(sharedStats.balance)}</p><p className="text-sm font-medium mt-1">Dougleisy te debe</p></div>
                                                ) : sharedStats.balance < 0 ? (
                                                    <div><p className="text-2xl font-bold text-rose-600">{formatUSD(Math.abs(sharedStats.balance))}</p><p className="text-sm font-medium mt-1">Le debes a Dougleisy</p></div>
                                                ) : (
                                                    <div><p className="text-2xl font-bold text-slate-400">$0.00</p><p className="text-sm font-medium mt-1">Están al día</p></div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MOVIMIENTOS */}
                            {activeTab === 'transactions' && (
                                <div className="max-w-5xl mx-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-lg font-bold">Historial de Movimientos</h3>
                                        <button onClick={() => { setModalType('personal'); setIsModalOpen(true); }} className="bg-emerald-600 text-white px-4 py-2 rounded-xl flex items-center gap-2"><IconPlus /><span className="hidden sm:inline">Nuevo</span></button>
                                    </div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                        {filteredTransactions.length === 0 ? <p className="p-10 text-center text-slate-400">Sin transacciones este mes.</p> : (
                                            <div className="divide-y divide-slate-100">
                                                {filteredTransactions.sort((a,b) => new Date(b.date) - new Date(a.date)).map(tx => (
                                                    <div key={tx.id} className="p-4 sm:p-5 flex items-center justify-between">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`p-3 rounded-full ${tx.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                                {tx.type === 'income' ? <IconArrowUpCircle /> : <IconArrowDownCircle />}
                                                            </div>
                                                            <div>
                                                                <p className="font-bold">{tx.description}</p>
                                                                <div className="flex gap-2 text-xs text-slate-500 mt-1"><span className="bg-slate-100 px-2 py-0.5 rounded-md">{tx.category}</span><span>•</span><span>{tx.date}</span></div>
                                                            </div>
                                                        </div>
                                                        <div className="text-right flex items-center gap-3">
                                                            <div>
                                                                <p className={`font-bold text-lg ${tx.type === 'income' ? 'text-emerald-600' : ''}`}>{tx.type === 'income' ? '+' : '-'}{formatUSD(tx.amountUSD)}</p>
                                                                <p className="text-xs text-slate-400">{formatVES(tx.amountVES)}</p>
                                                            </div>
                                                            <button onClick={() => handleDeleteTx(tx.id)} className="p-2 text-slate-300 hover:text-rose-500"><IconTrash2 /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* COMPARTIDOS */}
                            {activeTab === 'shared' && (
                                <div className="max-w-5xl mx-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-lg font-bold">Gastos Compartidos</h3>
                                        <button onClick={() => { setModalType('shared'); setIsModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-xl flex items-center gap-2"><IconPlus /><span className="hidden sm:inline">Añadir Gasto</span></button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-4 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="text-center border-r border-slate-100"><p className="text-sm text-slate-500">Pagado por Frederick</p><p className="text-xl font-bold">{formatUSD(sharedStats.paidByMe)}</p></div>
                                        <div className="text-center border-r border-slate-100"><p className="text-sm text-slate-500">Total Gastado</p><p className="text-xl font-bold text-blue-600">{formatUSD(sharedStats.total)}</p></div>
                                        <div className="text-center"><p className="text-sm text-slate-500">Pagado por Dougleisy</p><p className="text-xl font-bold">{formatUSD(sharedStats.paidByPartner)}</p></div>
                                    </div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                        {filteredShared.length === 0 ? <p className="p-10 text-center text-slate-400">Sin gastos compartidos este mes.</p> : (
                                            <div className="divide-y divide-slate-100">
                                                {filteredShared.sort((a,b) => new Date(b.date) - new Date(a.date)).map(exp => (
                                                    <div key={exp.id} className="p-4 sm:p-5 flex items-center justify-between">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`p-3 rounded-full ${exp.paidBy === 'me' ? 'bg-blue-100 text-blue-600' : 'bg-purple-100 text-purple-600'}`}><IconUsers /></div>
                                                            <div>
                                                                <p className="font-bold">{exp.description}</p>
                                                                <p className="text-xs text-slate-500 mt-1">Por: <span className="font-semibold">{exp.paidBy === 'me' ? 'Frederick' : 'Dougleisy'}</span> • {exp.date}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right flex items-center gap-3">
                                                            <div><p className="font-bold text-lg">{formatUSD(exp.amountUSD)}</p><p className="text-xs text-slate-400">{formatVES(exp.amountVES)}</p></div>
                                                            <button onClick={() => handleDeleteShared(exp.id)} className="p-2 text-slate-300 hover:text-rose-500"><IconTrash2 /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {isModalOpen && <TransactionModal type={modalType} rates={rates} onClose={() => setIsModalOpen(false)} onSave={handleSaveTransaction} />}
                </div>
            );
        }

        // --- COMPONENTES AUXILIARES ---
        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl ${active ? 'bg-emerald-800/80 text-emerald-400 font-semibold' : 'text-emerald-100 hover:bg-emerald-800/40'}`}>{icon}<span>{label}</span></button>
        );

        const MobileNavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center w-full ${active ? 'text-emerald-400' : 'text-emerald-100/70'}`}><div className="mb-1">{icon}</div><span className="text-[10px] font-medium">{label}</span></button>
        );

        function TransactionModal({ type, rates, onClose, onSave }) {
            const isPersonal = type === 'personal';
            const expenseCategories = ['Alimentos', 'Transporte', 'Servicios', 'Salidas/Ocio', 'Salud', 'Otros'];
            const incomeCategories = ['Pago Gringoland', 'Pago Rubifactory', 'Pago Minimal Studio', 'Otros'];
            const sharedCategories = ['Alimentos/Mercado', 'Servicios', 'Salidas', 'Otros'];

            const [txType, setTxType] = useState('expense'); 
            const [amountInput, setAmountInput] = useState('');
            const [currency, setCurrency] = useState('USD');
            const [rateType, setRateType] = useState('bcv'); 
            const [customRate, setCustomRate] = useState('');
            const [category, setCategory] = useState(isPersonal ? expenseCategories[0] : sharedCategories[0]);
            const [description, setDescription] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [paidBy, setPaidBy] = useState('me'); 
            const [syncOther, setSyncOther] = useState(false); 

            const effectiveRate = customRate ? parseFloat(customRate) : rates[rateType];
            const amountNum = parseFloat(amountInput) || 0;
            const amountUSD = currency === 'USD' ? amountNum : amountNum / effectiveRate;
            const amountVES = currency === 'VES' ? amountNum : amountNum * effectiveRate;

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!amountNum || !description) return;
                const baseData = { amountUSD, amountVES, currency, rateType: customRate ? 'custom' : rateType, rateUsed: effectiveRate, description, date };
                if (isPersonal) onSave({ ...baseData, type: txType, category }, syncOther);
                else onSave({ ...baseData, paidBy, category }, syncOther);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-5 text-white flex justify-between items-center ${isPersonal ? (txType === 'income' ? 'bg-emerald-600' : 'bg-slate-800') : 'bg-blue-600'}`}>
                            <h2 className="text-xl font-bold">{isPersonal ? (txType === 'income' ? 'Registrar Ingreso' : 'Registrar Gasto') : 'Gasto Compartido'}</h2>
                            <button onClick={onClose}><IconX /></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">
                            <form id="tx-form" onSubmit={handleSubmit} className="space-y-5">
                                {isPersonal && (
                                    <div className="flex p-1 bg-slate-100 rounded-xl">
                                        <button type="button" onClick={() => {setTxType('expense'); setCategory(expenseCategories[0]);}} className={`flex-1 py-2 text-sm font-bold rounded-lg ${txType === 'expense' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500'}`}>Gasto</button>
                                        <button type="button" onClick={() => {setTxType('income'); setCategory(incomeCategories[0]);}} className={`flex-1 py-2 text-sm font-bold rounded-lg ${txType === 'income' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>Ingreso</button>
                                    </div>
                                )}
                                {!isPersonal && (
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold">¿Quién pagó?</label>
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => setPaidBy('me')} className={`flex-1 py-3 border-2 rounded-xl font-bold ${paidBy === 'me' ? 'border-blue-600 bg-blue-50 text-blue-700' : ''}`}>Frederick</button>
                                            <button type="button" onClick={() => setPaidBy('partner')} className={`flex-1 py-3 border-2 rounded-xl font-bold ${paidBy === 'partner' ? 'border-purple-600 bg-purple-50 text-purple-700' : ''}`}>Dougleisy</button>
                                        </div>
                                    </div>
                                )}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="col-span-2 space-y-1"><label className="text-sm font-semibold">Monto</label><input type="number" step="0.01" required className="w-full bg-slate-50 border p-3 rounded-xl text-lg font-bold" value={amountInput} onChange={e => setAmountInput(e.target.value)} /></div>
                                    <div className="space-y-1"><label className="text-sm font-semibold">Moneda</label><select className="w-full bg-slate-50 border p-3 rounded-xl font-bold" value={currency} onChange={e => setCurrency(e.target.value)}><option value="USD">USD ($)</option><option value="VES">Bs</option></select></div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border space-y-3">
                                    <div className="flex justify-between items-center"><label className="text-sm font-semibold">Tasa a utilizar</label><span className="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded font-bold">1 USD = {effectiveRate} Bs</span></div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => {setRateType('bcv'); setCustomRate('');}} className={`flex-1 py-2 text-sm rounded border font-medium ${rateType === 'bcv' && !customRate ? 'bg-white border-emerald-500 text-emerald-700' : ''}`}>BCV</button>
                                        <button type="button" onClick={() => {setRateType('binance'); setCustomRate('');}} className={`flex-1 py-2 text-sm rounded border font-medium ${rateType === 'binance' && !customRate ? 'bg-white border-emerald-500 text-emerald-700' : ''}`}>Paralelo</button>
                                    </div>
                                    <input type="number" step="0.01" placeholder="Tasa manual (opcional)" className="w-full text-sm border p-2 rounded outline-none" value={customRate} onChange={e => setCustomRate(e.target.value)} />
                                </div>
                                {amountInput && <div className="text-center p-3 bg-blue-50 text-blue-800 rounded-xl border border-blue-100"><p className="text-sm">Equivalente:</p><p className="text-lg font-bold">{currency === 'USD' ? `${amountVES.toFixed(2)} Bs` : `$${amountUSD.toFixed(2)} USD`}</p></div>}
                                <div className="space-y-4">
                                    <div className="space-y-1"><label className="text-sm font-semibold">Descripción</label><input type="text" required className="w-full bg-slate-50 border p-3 rounded-xl text-sm" value={description} onChange={e => setDescription(e.target.value)} /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1"><label className="text-sm font-semibold">Categoría</label>
                                            <select className="w-full bg-slate-50 border p-3 rounded-xl text-sm" value={category} onChange={e => setCategory(e.target.value)}>
                                                {isPersonal ? (txType === 'income' ? incomeCategories.map(c => <option key={c}>{c}</option>) : expenseCategories.map(c => <option key={c}>{c}</option>)) : sharedCategories.map(c => <option key={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1"><label className="text-sm font-semibold">Fecha</label><input type="date" required className="w-full bg-slate-50 border p-3 rounded-xl text-sm" value={date} onChange={e => setDate(e.target.value)} /></div>
                                    </div>
                                    {isPersonal && txType === 'expense' && (
                                        <div className="flex items-center gap-3 p-4 bg-blue-50 border border-blue-100 rounded-xl mt-4"><input type="checkbox" id="s1" checked={syncOther} onChange={e => setSyncOther(e.target.checked)} className="w-5 h-5" /><label htmlFor="s1" className="text-sm text-blue-800 font-semibold cursor-pointer">Agregar también a Gastos de Pareja</label></div>
                                    )}
                                    {!isPersonal && paidBy === 'me' && (
                                        <div className="flex items-center gap-3 p-4 bg-emerald-50 border border-emerald-100 rounded-xl mt-4"><input type="checkbox" id="s2" checked={syncOther} onChange={e => setSyncOther(e.target.checked)} className="w-5 h-5" /><label htmlFor="s2" className="text-sm text-emerald-800 font-semibold cursor-pointer">Reflejar en mi Resumen Personal</label></div>
                                    )}
                                </div>
                            </form>
                        </div>
                        <div className="p-5 border-t bg-slate-50 flex justify-end gap-3">
                            <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-xl font-bold">Cancelar</button>
                            <button type="submit" form="tx-form" className={`px-6 py-2.5 rounded-xl text-white font-bold ${isPersonal ? 'bg-emerald-600' : 'bg-blue-600'}`}>Guardar</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
